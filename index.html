<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>夜刀的小窝</title>
    <style>
        /* 页面基础设置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* 底部备案号区域样式 */
        .footer {
            position: fixed;
            bottom: 20px; /* 距离底部 20 像素 */
            left: 0;
            width: 100%;
            text-align: center; /* 居中对齐 */
            font-size: 12px; /* 缩小字号 */
        }

        /* 备案号链接样式 */
        .footer a {
            color: #777; /* 使用浅灰色，避免过于抢眼 */
            text-decoration: none; /* 去掉默认下划线 */
        }

        .footer a:hover {
            text-decoration: underline; /* 鼠标悬停时显示下划线 */
        }
    </style>
</head>
<body>
    <h1>夜刀的小窝</h1>
    <p>网站出了小问题，正在维护中中……</p>

    <!-- 备案信息移动至底部 -->
    <div class="footer">
        <a href="http://beian.miit.gov.cn/" target="_blank">桂ICP备2026013724号-1</a>
    </div>
</body>
</html>
